<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Operaciones con Matrices</title>
</head>
<body>
    <h1>Operaciones con Matrices</h1>
    
    <div>
        <input type="number" id="filas" placeholder="Filas" />
        <input type="number" id="columnas" placeholder="Columnas" />
        <button onclick="generarMatrices()">Generar Matrices</button>
    </div>

    <div class="matrix-container" id="contenedor-matrices"></div>

    <div id="controles" style="display: none">
      <button onclick="operar('sumar')">Sumar</button>
      <button onclick="operar('multiplicar')">Multiplicar</button>
    </div>

    <div id="resultado" class="result"></div>

    <script src="script.js"></script>
</body>
</html>
